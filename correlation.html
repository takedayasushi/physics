<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>相関関係メーカー</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 20px; background-color: #f4f4f4; }
        h1 { color: #333; }
        canvas { border: 1px solid #ccc; background-color: #fff; touch-action: none; }
        #controls { margin-top: 15px; font-size: 1.2em; color: #555; }
        #resetButton { padding: 10px 20px; font-size: 1em; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>相関関係メーカー</h1>
    <canvas id="correlationCanvas" width="600" height="400"></canvas>
    <div id="controls">
        相関係数 r: <span id="correlationCoefficient">0.00</span>
    </div>
    <button id="resetButton">リセット</button>

    <script src="correlation.js"></script>
</body>
</html>
