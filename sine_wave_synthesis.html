<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正弦波の合成シミュレーション</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>正弦波の合成</h1>
        <p><a href="index.html">ホームに戻る</a></p>

        <div class="wave-controls">
            <!-- Wave 1 Controls -->
            <fieldset>
                <legend>波 1 (赤)</legend>
                <label for="amp1">振幅:</label>
                <input type="range" id="amp1" min="0" max="100" value="50">
                <span id="amp1-value">50</span>

                <label for="freq1">周波数:</label>
                <input type="range" id="freq1" min="0.1" max="5" value="1" step="0.1">
                <span id="freq1-value">1.0</span>

                <label for="phase1">位相:</label>
                <input type="range" id="phase1" min="0" max="360" value="0">
                <span id="phase1-value">0</span>°
            </fieldset>

            <!-- Wave 2 Controls -->
            <fieldset>
                <legend>波 2 (青)</legend>
                <label for="amp2">振幅:</label>
                <input type="range" id="amp2" min="0" max="100" value="50">
                <span id="amp2-value">50</span>

                <label for="freq2">周波数:</label>
                <input type="range" id="freq2" min="0.1" max="5" value="1.2" step="0.1">
                <span id="freq2-value">1.2</span>

                <label for="phase2">位相:</label>
                <input type="range" id="phase2" min="0" max="360" value="0">
                <span id="phase2-value">0</span>°
            </fieldset>
        </div>

        <canvas id="wave-canvas" width="800" height="400"></canvas>

        <div class="explanation">
            <h3>学べる物理現象</h3>
            <div class="principle">
                <h4>重ね合わせの原理</h4>
                <p>合成波（紫）は、波1（赤）と波2（青）の各点の変位（yの値）を単純に足し合わせたものです。このシミュレーションで、波がどのように干渉し合うかを視覚的に確認できます。</p>
            </div>
            <div id="beat-phenomenon" class="principle" style="display: none;">
                <h4>うなり</h4>
                <p>2つの波の周波数が近いと、合成波の振幅が周期的に大きく変化する「うなり」という現象が観察できます。うなりの周波数（1秒あたりの強弱の回数）は、2つの周波数の差の絶対値 <strong>|f1 - f2|</strong> になります。</p>
            </div>
        </div>
        
    </div>
    <script src="sine_wave_synthesis.js"></script>
</body>
</html>
