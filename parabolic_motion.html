<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>放物運動シミュレーション</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>放物運動シミュレーション</h1>
    <p><a href="index.html">ホームに戻る</a></p>
    <div class="controls">
        <label for="initial_velocity">初速度 (m/s):</label>
        <input type="number" id="initial_velocity" value="50" step="1">
        
        <label for="angle">角度 (度):</label>
        <input type="number" id="angle" value="45" step="1">

        <label for="gravity">重力加速度 (m/s²):</label>
        <input type="number" id="gravity" value="9.8" step="0.1">

        <button id="start_simulation">シミュレーション開始</button>
        <button id="reset_simulation">リセット</button>
    </div>
    <div class="results">
        <p>到達距離: <span id="range">0</span> m</p>
        <p>最高到達点: <span id="max_height">0</span> m</p>
        <p>滞空時間: <span id="flight_time">0</span> s</p>
    </div>
    <canvas id="simulation_canvas" width="800" height="400"></canvas>

    <script src="parabolic_motion.js"></script>
</body>
</html>
